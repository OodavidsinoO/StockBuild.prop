name: Build from OTA URL

on:
  workflow_dispatch:
    inputs:
      device_codename:
        description: 'Device codename (e.g., fuxi, kebab, pacman)'
        required: true
        type: string
      ota_url:
        description: 'Direct URL to OTA ZIP file'
        required: true
        type: string
      device_name:
        description: 'Friendly device name (optional, e.g., Xiaomi 13)'
        required: false
        type: string

jobs:
  build:
    name: Build props from URL
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install APT packages
        run: |
          sudo apt install -y dos2unix

      - name: Set up Python venv
        run: |
          python3 -m venv .venv/
          . .venv/bin/activate
          echo PATH=$PATH >> "$GITHUB_ENV"

      - name: Install payload_dumper
        run: pip install git+https://github.com/5ec1cff/payload-dumper

      - name: Make all scripts executable
        run: chmod +x *.sh

      - name: Download OTA for ${{ inputs.device_codename }}
        run: ./download_ota_from_url.sh "${{ inputs.ota_url }}" "${{ inputs.device_codename }}"

      - name: Extract images and build
        id: extract_and_build
        run: ./extract_images.sh

      - name: Determine release tag
        id: get_tag
        run: |
          echo "tag=${{ inputs.device_codename }}-$(date '+%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          MODULE_FILE="${{ steps.extract_and_build.outputs.module_base_name }}.zip"

          echo "## ${{ steps.extract_and_build.outputs.device_name }} (${{ steps.extract_and_build.outputs.device_codename }})" > .release_body
          echo "#### Module" >> .release_body
          echo "- File name: \`${{ steps.extract_and_build.outputs.module_base_name }}.zip\`" >> .release_body
          echo "- File hash (SHA256): \`${{ steps.extract_and_build.outputs.module_hash }}\`" >> .release_body
          echo "#### Firmware" >> .release_body
          echo "- Build Description: \`${{ steps.extract_and_build.outputs.device_build_description }}\`" >> .release_body
          echo "- Android Version: \`${{ steps.extract_and_build.outputs.device_build_android_version }}\`" >> .release_body
          echo "- Security Patch: \`${{ steps.extract_and_build.outputs.device_build_security_patch }}\`" >> .release_body

          gh release create "$TAG" "$MODULE_FILE" \
            --title "${{ inputs.device_codename }} (${{ inputs.device_name }}) - $(date '+%Y-%m-%d')" \
            --notes-file .release_body \
            --prerelease=false \
            || gh release upload "$TAG" "$MODULE_FILE" --clobber

      - name: Send to Telegram
        if: env.BOT_TOKEN != ''
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          {
            echo 'StockBuild: ${{ steps.extract_and_build.outputs.device_name }} - ${{ steps.extract_and_build.outputs.device_codename }}';
            echo '${{ steps.extract_and_build.outputs.device_build_description }}'
          } > .tg_caption
          curl -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendDocument" \
            -H "Content-Type: multipart/form-data" \
            -F "chat_id=$CHANNEL_ID" \
            -F "document=@${{ steps.extract_and_build.outputs.module_base_name }}.zip;type=application/zip" \
            -F "caption=$(cat .tg_caption)"
